<svg viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Sarthitantra — AI Career Navigator</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Icon badge -->
  <rect x="0" y="8" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- S-curve path -->
  <circle cx="19" cy="55" r="3.5" fill="white" opacity="0.9"/>
  <path d="M 19 55 C 19 41, 44 38, 44 28 C 44 18, 22 15, 22 4"
        stroke="url(#pathGrad)" stroke-width="4.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="42" cy="29" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="22" cy="4" r="4" fill="white"/>
  <path d="M 18 8 L 22 2 L 26 8" fill="white" stroke="white"
        stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Sparkles -->
  <circle cx="54" cy="16" r="2.5" fill="white" opacity="0.45"/>
  <circle cx="48" cy="26" r="1.8" fill="white" opacity="0.3"/>
  <circle cx="58" cy="27" r="1.4" fill="white" opacity="0.25"/>

  <!-- Wordmark: "Sarthitantra" on one line, bold -->
  <text x="80" y="41"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="30" font-weight="700" fill="#312e81" letter-spacing="-0.5">Sarthi</text>
  <text x="80" y="62"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="18" font-weight="300" fill="#7c3aed" letter-spacing="4">tantra</text>

  <!-- Tagline — legible size -->
  <text x="228" y="62"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="13" fill="#94a3b8" letter-spacing="0.3">AI career navigator</text>

  <!-- Divider -->
  <line x1="222" y1="50" x2="222" y2="66" stroke="#e2e8f0" stroke-width="1.2"/>
</svg>
