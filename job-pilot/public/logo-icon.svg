<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Sarthitantra icon — AI-powered career navigation</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="path" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- S-curve: the guided career path -->
  <!-- Bottom node — start of the journey -->
  <circle cx="30" cy="76" r="5" fill="white" opacity="0.9"/>
  <!-- Flowing S-curve from bottom-left to top-right -->
  <path d="M 30 76 C 30 58, 64 55, 64 40 C 64 25, 32 22, 32 8"
        stroke="url(#path)" stroke-width="6" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mid node — AI touchpoint -->
  <circle cx="62" cy="42" r="5" fill="white" opacity="0.9"/>
  <!-- Top node — destination reached -->
  <circle cx="32" cy="8" r="5.5" fill="white"/>
  <!-- Arrow tip pointing upward at destination -->
  <path d="M 27 13 L 32 5 L 37 13" fill="white" stroke="white"
        stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Sparkle dots top-right — AI intelligence -->
  <circle cx="82" cy="18" r="3.5" fill="white" opacity="0.45"/>
  <circle cx="74" cy="30" r="2.5" fill="white" opacity="0.3"/>
  <circle cx="87" cy="32" r="2" fill="white" opacity="0.25"/>
</svg>
